<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>

        <div>
            <h1 id="gameWinner"></h1>
        </div>
        <div id="gameBoard">
        </div>
    </div>
</body>
<script>

    //Events
    addEventListener("load", _ => {

        const req = new Request(
            `${backendUrl}/game`,
            {
                method: "GET"
            }
        )

        fetch(req).then( res => {
            
            if ( res.status == 200 ) {
                
                res.json().then( data => {
                    
                    gameId = data['game_id'];
                });
            }
        });
        
        for ( let row = 0; row <= 2; row++ ) {
            
            for ( let col = 0; col <= 2; col++ ) {
                
                createSquare( row, col );
            }
        }
    });


    //Functions
    function clickSquare( el, square_row, square_column ) {
        
        el.target.innerHTML = "X";
        el.target.disabled = true;

        const gameState = [];
        const gameSquares = gameBoard.childNodes;
        for ( const square of gameSquares ) {
            
            if ( square.tagName == "BUTTON" ) {
                
                gameState.push( square.innerHTML );
            }
        }
        
        const req = new Request(
            `${backendUrl}/play`,
            {
                method: "POST",
                headers: { 'Content-Type': "application/json" },
                body: JSON.stringify({ game_id: gameId, row: square_row, col: square_column })
            }
        );
        
        fetch(req).then( res => {
            
            if ( res.status == 200 ) {

                res.json().then( data => {

                    if ( data.row !== undefined && data.col !== undefined ) {

                        const ai_square = document.getElementById(`square_${ data.row }_${ data.col }`);
                        
                        ai_square.innerHTML = "O";
                        ai_square.disabled = true;
                    }

                    if ( data.finished ) {

                        const gameWinner = document.getElementById("gameWinner");
                        gameWinner.innerText = !data.draw ? `Vitória do ${ data.winner }` : "Empate"

                        for ( let i = 0; i <= 2; i++) {
                            
                            for ( let j = 0; j <= 2; j++) {

                                const square = document.getElementById(`square_${ i }_${ j }`);
                                square.disabled = true;
                            }
                        }
                    }
                } );
            }
        } );
    }

    function createSquare( row, col ) {

        const newSquare = document.createElement("button");
        newSquare.className = "square";
        newSquare.id = `square_${ row }_${ col }`;
        newSquare.style = `grid-row: ${ row + 1 }; grid-column: ${ col + 1 }`;
        newSquare.onclick = el => clickSquare(el, row, col);

        gameBoard.appendChild( newSquare );
    }


    const backendUrl = "http://127.0.0.1:8000";

    const gameBoard = document.getElementById("gameBoard");
    const squares = [];
    let gameId;

</script>
<style>

    html, body {

        background-color: #F1F1F1;

        display: flex;
        justify-content: center;
        align-items: center;

        height: 100%;
        width: 100%;

    }

    #gameWinner {
        
        display: flex;
        justify-content: center;
        align-items: center;

    }
    
    #gameBoard {

        background-color: #E9E9E9;
        
        display: grid;
        width: fit-content;
        height: fit-content;
        
        padding: 5px;

        border-radius: 10px;
        border-color: #90BBFF;
        border-style: solid;
        border-width: 3px;
    }

    .square {

        background-color: white;

        margin: 1px;
        
        width: 65px;
        height: 65px;

        border-color: #90BBFF;
        border-radius: 10px;

        font-size: large;

    }

</style>
</html>
